<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETWOLF Pro — OS & Service Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/pro.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <span>NETWOLF <small class="opacity-50 text-[10px] uppercase tracking-widest font-mono">Pro</small></span>
            </div>
            <nav class="flex-1">
                <a href="dashboard.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Dashboard</a>
                <a href="discovery.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg> Network Discovery</a>
                <a href="scanner.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg> Port Scanner</a>
                <a href="os_detect.html" class="nav-link active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> OS / Services</a>
                <a href="dos.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> DoS Module</a>
            </nav>
            <div class="mt-auto pt-6 border-t border-white/5">
                <a href="settings.html" class="nav-link">Settings</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header-bar">
                <h1 class="page-title">Advanced Target Fingerprinting</h1>
                <div class="status-badge">
                    <div class="status-dot"></div>
                    Analyzer Module Ready
                </div>
            </header>

            <div class="grid grid-cols-1 gap-8">
                <!-- Control Card -->
                <div class="pro-card animate-fade">
                    <h2 class="text-xs font-bold uppercase tracking-widest mb-6 opacity-60">Analysis Parameters</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="text-[10px] font-mono uppercase text-dim block mb-2">Victim Host Address</label>
                            <input type="text" id="targetIP" placeholder="e.g. 192.168.1.50" class="pro-input">
                        </div>
                        <div>
                            <label class="text-[10px] font-mono uppercase text-dim block mb-2">Probe Port List (Comma Separated)</label>
                            <input type="text" id="targetPorts" placeholder="22, 80, 443, 3389" class="pro-input">
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end">
                        <button id="detectBtn" onclick="runDetection()" class="pro-btn">Initialize Fingerprinting</button>
                    </div>
                </div>

                <!-- Analysis Results -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- OS Data -->
                    <div class="space-y-4">
                        <h2 class="text-xs font-bold uppercase tracking-widest opacity-60">OS Stack Fingerprint</h2>
                        <div id="osResults" class="pro-card h-[250px] flex items-center justify-center border-dashed">
                            <p class="text-dim text-xs font-mono">Host analysis required...</p>
                        </div>
                    </div>

                    <!-- Service Banners -->
                    <div class="space-y-4">
                        <h2 class="text-xs font-bold uppercase tracking-widest opacity-60">Service Banner Capture</h2>
                        <div id="serviceResults" class="terminal h-[250px] overflow-y-auto">
                            <div class="opacity-30">Waiting for probe response...</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/netwolf.js"></script>
    <script src="../assets/js/os_detect.js"></script>
    <script>
        // Override for Pro UI
        const originalRunDetection = runDetection;
        // The original script is already fairly clean, we just need to ensure the output elements match
    </script>
</body>
</html>
