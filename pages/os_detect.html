<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETWOLF Pro — Intelligence Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/pro.css">
</head>
<body>

    <div class="app-shell">
        <aside class="side-nav">
            <div class="mb-10 flex items-center gap-3 px-2">
                <div class="w-8 h-8 bg-accent rounded-lg flex items-center justify-center">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#020617" stroke-width="3"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <span class="font-extrabold text-lg tracking-tighter italic">NETWOLF <small class="text-[9px] font-mono not-italic opacity-40 uppercase tracking-widest">v1.0</small></span>
            </div>
            <nav class="flex-1 space-y-1">
                <a href="dashboard.html" class="nav-item">Dashboard</a>
                <a href="discovery.html" class="nav-item">Discovery</a>
                <a href="scanner.html" class="nav-item">Port Scanner</a>
                <a href="os_detect.html" class="nav-item active">OS / Services</a>
                <a href="dos.html" class="nav-item text-danger hover:!bg-danger/10">DoS Module</a>
            </nav>
            <div class="mt-auto pt-4 border-t border-white/5 space-y-1">
                <a href="logs.html" class="nav-item !py-2 opacity-60">System Logs</a>
                <a href="settings.html" class="nav-item !py-2 opacity-60">Environment</a>
            </div>
        </aside>

        <main class="main-view">
            <div class="mb-10">
                <h1 class="text-3xl font-black tracking-tighter mb-1">Target Intelligence</h1>
                <p class="text-text-dim text-sm font-medium opacity-60">Deep packet analysis for OS and service identification.</p>
            </div>

            <div class="grid grid-cols-1 gap-8">
                <!-- Parameters -->
                <div class="card-pro animate-in">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-accent mb-6">Heuristic Parameters</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div class="md:col-span-1 lg:col-span-2">
                            <label class="text-[10px] font-bold uppercase text-text-dim mb-2 block tracking-widest">Victim IP / Hostname</label>
                            <input type="text" id="targetIP" placeholder="e.g. 192.168.1.50" class="input-pro text-xs">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold uppercase text-text-dim mb-2 block tracking-widest">Probe Ports</label>
                            <input type="text" id="targetPorts" placeholder="22, 80, 443" class="input-pro text-xs">
                        </div>
                        <div class="flex items-end">
                            <button id="detectBtn" onclick="runProDetection()" class="btn-pro w-full py-4 shadow-lg shadow-accent/20">Initialize Probe</button>
                        </div>
                    </div>
                </div>

                <!-- Analysis Grid -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <!-- OS Data -->
                    <div class="space-y-4">
                        <h2 class="text-xs font-black uppercase tracking-widest opacity-40 px-2">Stack Fingerprint</h2>
                        <div id="osBox" class="card-pro h-[300px] flex flex-col justify-center items-center border-dashed relative overflow-hidden animate-in" style="animation-delay: 0.1s">
                            <div id="osContent" class="text-center space-y-4">
                                <div class="w-12 h-12 border-2 border-white/5 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" class="opacity-20"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                                </div>
                                <p class="text-xs font-mono text-text-dim uppercase tracking-[0.2em]">Awaiting Host Data</p>
                            </div>
                        </div>
                    </div>

                    <!-- Service Banners -->
                    <div class="space-y-4">
                        <h2 class="text-xs font-black uppercase tracking-widest opacity-40 px-2">Banner Manifest</h2>
                        <div id="serviceBox" class="terminal-pro h-[300px] overflow-y-auto animate-in" style="animation-delay: 0.2s">
                            <div class="opacity-20 italic text-[10px]">Ready for probe response...</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/netwolf.js"></script>
    <script src="../assets/js/os_detect.js"></script>
    <script>
        async function runProDetection() {
            const ip = document.getElementById('targetIP').value;
            const portsStr = document.getElementById('targetPorts').value;
            const osBox = document.getElementById('osBox');
            const osContent = document.getElementById('osContent');
            const svcBox = document.getElementById('serviceBox');
            const btn = document.getElementById('detectBtn');

            if (!ip) return alert("Target host required.");
            
            btn.disabled = true;
            osContent.innerHTML = '<div class="w-8 h-8 border-2 border-accent border-t-transparent rounded-full animate-spin mx-auto"></div><div class="text-[10px] font-mono text-accent uppercase tracking-widest mt-4">Analyzing IP Stack...</div>';
            svcBox.innerHTML = '<div class="text-accent opacity-50 font-mono text-[10px] animate-pulse uppercase tracking-widest">Negotiating banner handshakes...</div>';

            try {
                // OS Analysis
                const osRes = await fetch('/api/os_detect', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ ip })
                });
                const osData = await osRes.json();
                
                if (osData.success) {
                    osContent.innerHTML = `
                        <div class="text-[10px] font-black uppercase text-accent tracking-[0.3em] mb-4">Match Identified</div>
                        <div class="text-4xl font-black text-white tracking-tighter mb-2">${osData.os}</div>
                        <div class="inline-block px-3 py-1 bg-white/5 rounded-full text-[10px] font-mono text-text-dim italic">TTL: ${osData.ttl}</div>
                    `;
                }

                // Service Analysis
                if (portsStr) {
                    const svcRes = await fetch('/api/service_detect', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ ip, ports: portsStr.split(',').map(p => p.trim()) })
                    });
                    const svcData = await svcRes.json();
                    
                    if (svcData.success) {
                        svcBox.innerHTML = '';
                        svcData.results.forEach(s => {
                            const line = document.createElement('div');
                            line.className = 'mb-4 border-b border-white/5 pb-2 last:border-0';
                            line.innerHTML = `
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-accent font-black text-xs">PORT ${s.port}</span>
                                    <span class="text-[9px] font-bold text-white/40 uppercase tracking-widest">${s.service}</span>
                                </div>
                                <div class="text-[10px] text-white/60 font-mono bg-white/[0.02] p-2 rounded border border-white/5 break-all">${s.banner || 'NO BANNER RESPONSE'}</div>
                            `;
                            svcBox.appendChild(line);
                        });
                    }
                } else {
                    svcBox.innerHTML = '<div class="opacity-20 italic text-[10px] text-center py-12">Supply ports for banner grab analysis.</div>';
                }

            } catch (e) {
                osContent.innerHTML = `<div class="text-danger font-mono text-[10px] uppercase">Analysis Failed: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
