<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETWOLF Pro — Port Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/pro.css">
</head>
<body>

    <div class="app-shell">
        <aside class="side-nav">
            <div class="mb-10 flex items-center gap-3 px-2">
                <div class="w-8 h-8 bg-accent rounded-lg flex items-center justify-center">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#020617" stroke-width="3"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <span class="font-extrabold text-lg tracking-tighter italic">NETWOLF <small class="text-[9px] font-mono not-italic opacity-40 uppercase tracking-widest">v1.0</small></span>
            </div>
            
            <nav class="flex-1 space-y-1">
                <a href="dashboard.html" class="nav-item">Dashboard</a>
                <a href="discovery.html" class="nav-item">Discovery</a>
                <a href="scanner.html" class="nav-item active">Port Scanner</a>
                <a href="os_detect.html" class="nav-item">OS / Services</a>
                <a href="dos.html" class="nav-item text-danger hover:!bg-danger/10">DoS Module</a>
            </nav>

            <div class="mt-auto pt-4 border-t border-white/5 space-y-1">
                <a href="logs.html" class="nav-item !py-2 opacity-60">System Logs</a>
                <a href="settings.html" class="nav-item !py-2 opacity-60">Environment</a>
            </div>
        </aside>

        <main class="main-view">
            <div class="flex justify-between items-center mb-10 text-white">
                <div>
                    <h1 class="text-3xl font-black tracking-tighter mb-1">Port Scanner</h1>
                    <p class="text-text-dim text-sm font-medium italic opacity-60">Multi-threaded socket mapping engine.</p>
                </div>
                <div id="statusBadge" class="hidden px-4 py-2 bg-accent/10 rounded-xl text-accent font-bold text-xs uppercase tracking-widest border border-accent/20 flex items-center gap-2">
                    <span class="w-2 h-2 bg-accent rounded-full animate-ping"></span>
                    Scanning Host
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                <div class="lg:col-span-1 space-y-6">
                    <div class="card-pro animate-in">
                        <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-accent mb-6">Probe Logic</h3>
                        <div class="space-y-5">
                            <div>
                                <label class="text-[10px] font-bold uppercase text-text-dim mb-2 block tracking-widest">Target Host</label>
                                <input type="text" id="targetIP" placeholder="e.g. 192.168.1.1" class="input-pro text-xs">
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="text-[10px] font-bold uppercase text-text-dim mb-2 block tracking-widest">Start</label>
                                    <input type="number" id="portStart" value="1" class="input-pro text-xs">
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold uppercase text-text-dim mb-2 block tracking-widest">End</label>
                                    <input type="number" id="portEnd" value="1024" class="input-pro text-xs">
                                </div>
                            </div>
                            <div class="flex items-center gap-3 py-2">
                                <input type="checkbox" id="scanUDP" class="accent-accent">
                                <label for="scanUDP" class="text-[10px] font-bold uppercase text-text-dim cursor-pointer tracking-tighter">Include common UDP ports</label>
                            </div>
                            <button id="scanBtn" onclick="executeScan()" class="btn-pro w-full py-4 shadow-lg shadow-accent/20">Execute Scan</button>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-3 card-pro animate-in h-[600px] flex flex-col" style="animation-delay: 0.1s">
                    <div class="flex justify-between items-center mb-6 opacity-40 px-2">
                        <h3 class="text-[10px] font-black uppercase tracking-[0.3em]">Mapping Console</h3>
                        <span class="text-[9px] font-mono tracking-tighter uppercase" id="resultsCount">0 Sockets OPEN</span>
                    </div>
                    <div id="resultsBody" class="terminal-pro flex-1 overflow-y-auto !bg-transparent !border-none !p-0 space-y-1">
                        <div class="opacity-20 font-mono italic text-[10px]">Awaiting socket probe initialization...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/netwolf.js"></script>
    <script src="../assets/js/scanner.js"></script>
    <script>
        async function executeScan() {
            const ip = document.getElementById('targetIP').value;
            const start = document.getElementById('portStart').value;
            const end = document.getElementById('portEnd').value;
            const udp = document.getElementById('scanUDP').checked;
            const body = document.getElementById('resultsBody');
            const badge = document.getElementById('statusBadge');
            const btn = document.getElementById('scanBtn');
            const countEl = document.getElementById('resultsCount');

            if (!ip) return alert("Target IP required.");

            body.innerHTML = '<div class="text-[10px] text-accent font-mono animate-pulse opacity-50 uppercase tracking-[0.2em] py-4 border-b border-accent/10 mb-4">Establishing TCP/IP Handshakes with host...</div>';
            badge.classList.remove('hidden');
            btn.disabled = true;
            let openFound = 0;

            try {
                const res = await fetch('/api/scan', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ ip, portStart: start, portEnd: end, scan_udp: udp })
                });
                const data = await res.json();
                
                if (data.success) {
                    body.innerHTML = '';
                    if (data.results.length === 0) {
                        body.innerHTML = '<div class="opacity-30 py-8 text-center text-xs">NO OPEN SOCKETS IDENTIFIED IN RANGE</div>';
                    } else {
                        data.results.forEach(r => {
                            if (r.status === 'open') {
                                openFound++;
                                const line = document.createElement('div');
                                line.className = 'flex gap-6 py-2 border-b border-white/[0.03] hover:bg-white/[0.02] transition-colors group';
                                line.innerHTML = `
                                    <span class="text-white/20 font-mono w-16">${new Date().toLocaleTimeString()}</span>
                                    <span class="text-accent font-black w-24">PORT ${r.port}</span>
                                    <span class="text-white/40 uppercase tracking-widest text-[9px] w-20">${r.protocol}</span>
                                    <span class="text-white font-medium flex-1">${r.service || 'unknown'}</span>
                                    <span class="text-[9px] font-black text-accent bg-accent/10 px-2 py-0.5 rounded">OPEN</span>
                                `;
                                body.appendChild(line);
                            }
                        });
                    }
                    countEl.textContent = `${openFound} Sockets OPEN`;
                    saveToStorage(ip, data.results);
                } else {
                    body.innerHTML = `<div class="text-danger font-mono uppercase text-xs p-4 bg-danger/5 border border-danger/20 rounded-xl">${data.message}</div>`;
                }
            } catch (e) {
                body.innerHTML = `<div class="text-danger font-mono uppercase text-xs">Transmission Error: ${e.message}</div>`;
            } finally {
                badge.classList.add('hidden');
                btn.disabled = false;
                body.scrollTop = 0;
            }
        }
    </script>
</body>
</html>
