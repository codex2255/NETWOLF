<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETWOLF Pro — System Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/pro.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <span>NETWOLF <small class="opacity-50 text-[10px] uppercase tracking-widest font-mono">Pro</small></span>
            </div>
            <nav class="flex-1">
                <a href="dashboard.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Dashboard</a>
                <a href="discovery.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg> Network Discovery</a>
                <a href="scanner.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg> Port Scanner</a>
                <a href="os_detect.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> OS / Services</a>
                <a href="dos.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> DoS Module</a>
            </nav>
            <div class="mt-auto pt-6 border-t border-white/5">
                <a href="settings.html" class="nav-link">Settings</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header-bar">
                <h1 class="page-title">Event Repository</h1>
                <div class="flex gap-2">
                    <button onclick="clearLogs()" class="text-[10px] font-bold uppercase tracking-widest text-danger border border-danger/30 px-4 py-2 rounded-lg hover:bg-danger hover:text-white transition-all">Flush Logs</button>
                </div>
            </header>

            <div class="pro-card animate-fade h-[calc(100vh-200px)] flex flex-col">
                <div class="grid grid-cols-5 gap-4 px-4 py-2 border-b border-white/5 text-[10px] font-mono uppercase text-dim tracking-widest">
                    <div class="col-span-1">Timestamp</div>
                    <div class="col-span-1">Vector</div>
                    <div class="col-span-1">Target</div>
                    <div class="col-span-2">Payload Details</div>
                </div>
                <div id="logsList" class="flex-1 overflow-y-auto font-mono text-[11px] divide-y divide-white/5">
                    <!-- Logs Inject -->
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/netwolf.js"></script>
    <script>
        function loadLogs() {
            var logs = localStorage.getItem('netwolf_logs');
            var list = document.getElementById('logsList');
            if (!logs || JSON.parse(logs).length === 0) {
                list.innerHTML = '<div class="py-24 text-center text-dim opacity-30 italic">Repository empty. No system events recorded.</div>';
                return;
            }
            logs = JSON.parse(logs);

            list.innerHTML = '';
            for (var i = logs.length - 1; i >= 0; i--) {
                var row = document.createElement('div');
                row.className = 'grid grid-cols-5 gap-4 px-4 py-3 hover:bg-white/5 transition-colors group';
                
                const typeColor = logs[i].type === 'scan' ? 'text-accent' : 'text-danger';
                
                row.innerHTML = `
                    <div class="col-span-1 text-white/40">${logs[i].time}</div>
                    <div class="col-span-1 font-bold ${typeColor} uppercase tracking-tighter">${logs[i].type}</div>
                    <div class="col-span-1 text-white/80">${logs[i].target}</div>
                    <div class="col-span-2 text-dim group-hover:text-white transition-colors">${logs[i].details}</div>
                `;
                list.appendChild(row);
            }
        }

        function clearLogs() {
            if (confirm('Permanently purge all event records?')) {
                localStorage.removeItem('netwolf_logs');
                loadLogs();
            }
        }

        loadLogs();
    </script>
</body>
</html>
