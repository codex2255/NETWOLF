<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETWOLF Pro — Network Discovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/pro.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <span>NETWOLF <small class="opacity-50 text-[10px] uppercase tracking-widest font-mono">Pro</small></span>
            </div>
            <nav class="flex-1">
                <a href="dashboard.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Dashboard</a>
                <a href="discovery.html" class="nav-link active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg> Network Discovery</a>
                <a href="scanner.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg> Port Scanner</a>
                <a href="os_detect.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> OS / Services</a>
                <a href="dos.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> DoS Module</a>
            </nav>
            <div class="mt-auto pt-6 border-t border-white/5">
                <a href="settings.html" class="nav-link">Settings</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header-bar">
                <h1 class="page-title text-accent">Network Topology Discovery</h1>
                <div class="status-badge">
                    <div class="status-dot"></div>
                    LAN Interface Active
                </div>
            </header>

            <div class="grid grid-cols-1 gap-8">
                <!-- Advanced Control Panel -->
                <div class="pro-card animate-fade">
                    <h2 class="text-xs font-bold uppercase tracking-widest mb-6 opacity-60">Discovery Parameters</h2>
                    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                        <div class="lg:col-span-2">
                            <label class="text-[10px] font-mono uppercase text-dim block mb-2">Target Segment / CIDR</label>
                            <input type="text" id="networkRange" placeholder="e.g. 192.168.1.0/24" class="pro-input">
                        </div>
                        <div>
                            <label class="text-[10px] font-mono uppercase text-dim block mb-2">Discovery Method</label>
                            <select id="discoveryMethod" class="pro-input bg-bg-secondary">
                                <option value="enhanced">Enhanced (Recommended)</option>
                                <option value="ping">ICMP Ping Sweep</option>
                                <option value="arp">ARP Table Mapping</option>
                                <option value="smart">Smart Router Discovery</option>
                                <option value="gateway">Gateway Segment Scan</option>
                                <option value="interfaces">All Local Interfaces</option>
                            </select>
                        </div>
                        <div class="flex items-end">
                            <button id="discoverBtn" onclick="startDiscovery()" class="pro-btn w-full shadow-[0_0_20px_rgba(0,255,163,0.2)]">Execute Task</button>
                        </div>
                    </div>
                </div>

                <div id="statusBar" class="hidden animate-fade">
                    <div class="pro-card border-accent/20 bg-accent/5">
                        <div class="flex justify-between items-center mb-2">
                            <span id="statusText" class="text-xs font-mono text-accent uppercase tracking-widest font-bold">Scanning network nodes...</span>
                            <span class="text-xs font-mono animate-pulse opacity-50 uppercase tracking-tighter">Probing Sockets</span>
                        </div>
                        <div class="w-full h-0.5 bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full bg-accent w-1/3 animate-[load_2s_infinite]"></div>
                        </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xs font-bold uppercase tracking-widest opacity-40">Identified Network Entities</h2>
                        <div class="text-[10px] font-mono text-dim px-3 py-1 bg-white/5 rounded-full">LIVE BUFFER</div>
                    </div>
                    <div id="resultsBody" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <div class="col-span-full py-24 text-center border border-dashed border-white/5 rounded-2xl bg-white/[0.01]">
                            <div class="text-dim text-xs font-mono uppercase tracking-[0.3em] opacity-30">Awaiting Discovery Initialization</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/netwolf.js"></script>
    <script src="../assets/js/discovery.js"></script>
</body>
</html>
