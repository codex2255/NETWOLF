<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETWOLF Pro — Intelligence Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/pro.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <span>NETWOLF <small class="opacity-50 text-[10px] uppercase tracking-widest font-mono">Pro</small></span>
            </div>
            <nav class="flex-1">
                <a href="dashboard.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Dashboard</a>
                <a href="discovery.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg> Network Discovery</a>
                <a href="scanner.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg> Port Scanner</a>
                <a href="os_detect.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> OS / Services</a>
                <a href="dos.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> DoS Module</a>
            </nav>
            <div class="mt-auto pt-6 border-t border-white/5">
                <a href="settings.html" class="nav-link">Settings</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header-bar">
                <h1 class="page-title">Post-Audit Intelligence</h1>
                <div class="flex gap-2">
                    <button onclick="exportJSON()" class="pro-btn text-xs">Export Manifest</button>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Summary -->
                <div class="lg:col-span-1 space-y-6">
                    <div class="pro-card animate-fade">
                        <h2 class="text-xs font-bold uppercase tracking-widest mb-6 opacity-60">Audit Metadata</h2>
                        <div id="summaryText" class="space-y-4 text-sm font-mono">
                            <p class="text-dim italic">No session data identified.</p>
                        </div>
                    </div>
                </div>

                <!-- Open Vector List -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="pro-card animate-fade" style="animation-delay: 0.1s">
                        <h2 class="text-xs font-bold uppercase tracking-widest mb-6 opacity-60">Active Exposure Vectors</h2>
                        <div id="openPortsList" class="divide-y divide-white/5">
                            <p class="py-12 text-center text-dim text-xs font-mono">Target scan required to populate exposure data.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/netwolf.js"></script>
    <script>
        var lastScan = null;

        function loadReport() {
            var raw = localStorage.getItem('netwolf_last_scan');
            if (!raw) return;

            lastScan = JSON.parse(raw);
            var open = lastScan.results.filter(r => r.status == 'open');

            document.getElementById('summaryText').innerHTML = `
                <div class="flex justify-between border-b border-white/5 pb-2"><span class="text-dim">TARGET</span> <span class="text-accent">${lastScan.ip}</span></div>
                <div class="flex justify-between border-b border-white/5 pb-2"><span class="text-dim">TOTAL PROBES</span> <span>${lastScan.results.length}</span></div>
                <div class="flex justify-between border-b border-white/5 pb-2"><span class="text-dim">VECTORS</span> <span class="text-accent">${open.length}</span></div>
                <div class="flex justify-between pb-2"><span class="text-dim">TIMESTAMP</span> <span>${lastScan.time}</span></div>
            `;

            if (open.length > 0) {
                var list = document.getElementById('openPortsList');
                list.innerHTML = '';
                open.forEach(p => {
                    var div = document.createElement('div');
                    div.className = 'py-3 flex justify-between items-center group hover:px-2 transition-all';
                    div.innerHTML = `
                        <div class="font-mono font-bold text-accent">PORT ${p.port}</div>
                        <div class="text-[10px] font-mono px-2 py-0.5 bg-accent/10 text-accent rounded uppercase">Vulnerable</div>
                    `;
                    list.appendChild(div);
                });
            }
        }

        function exportJSON() {
            if (!lastScan) return alert('No audit data available.');
            var a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(lastScan, null, 2)], {type:'application/json'}));
            a.download = `netwolf_audit_${lastScan.ip.replace(/\./g, '_')}.json`;
            a.click();
        }

        loadReport();
    </script>
</body>
</html>
