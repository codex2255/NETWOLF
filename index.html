<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETWOLF Pro — Initialize</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/pro.css">
    <style>
        body { background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .intro-box { text-align: center; max-width: 400px; width: 90%; }
        .logo-big { color: var(--accent); font-size: 3rem; font-weight: 800; letter-spacing: -0.05em; margin-bottom: 0.5rem; }
        .loader-bar { width: 100%; height: 2px; background: var(--border); border-radius: 99px; overflow: hidden; margin: 2rem 0; }
        .loader-progress { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); animation: load 3s ease-in-out forwards; }
        @keyframes load { to { width: 100%; } }
    </style>
</head>
<body>

    <div class="intro-box animate-fade">
        <div class="logo-big">NETWOLF <small class="text-sm opacity-50 font-mono tracking-tighter">PRO</small></div>
        <p class="text-dim text-xs font-mono uppercase tracking-[0.3em]">Advanced Network Auditing Suite</p>
        
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
        
        <div id="status" class="text-[10px] font-mono text-accent/60 uppercase tracking-widest">Initialising Core Modules...</div>
    </div>

    <script>
        const statuses = [
            "Authenticating Session...",
            "Mapping local interfaces...",
            "Verifying backend connectivity...",
            "Loading auditing engine...",
            "System Ready."
        ];
        let i = 0;
        const el = document.getElementById('status');
        const interval = setInterval(() => {
            if (i < statuses.length) {
                el.textContent = statuses[i++];
            } else {
                clearInterval(interval);
                setTimeout(() => {
                    window.location.href = 'pages/dashboard.html';
                }, 500);
            }
        }, 600);
    </script>
</body>
</html>
